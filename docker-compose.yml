services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: earning-edge-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: earning-edge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-earning_edge}
      POSTGRES_USER: ${POSTGRES_USER:-earning_edge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-earning_edge_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-earning_edge}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: earning-edge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Used starting Phase 4 — kept here so the dev compose mirrors prod from day one.
  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    container_name: earning-edge-playwright
    env_file:
      - .env
    profiles: ["browser"]
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
  redis_data:
